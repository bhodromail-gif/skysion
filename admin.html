<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - SKYSION</title>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: #fff;
      padding: 40px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th,
    td {
      padding: 12px;
      border: 1px solid #333;
      text-align: left;
    }

    th {
      background: #222;
    }

    select {
      background: #333;
      color: #fff;
      padding: 5px;
      border: none;
    }
  </style>
</head>

<body>
  <h2>😎 SKYSION ADMIN DASHBOARD (All Client Orders)</h2>
  <div id="admin-orders">
    <p>Loading orders...</p>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCdQ9XMtzELlWmtVvCt86dmkl8Oo4wyBFA",
      authDomain: "skysion.firebaseapp.com",
      projectId: "skysion",
      storageBucket: "skysion.firebasestorage.app",
      messagingSenderId: "984734912155",
      appId: "1:984734912155:web:246eb7168f775fb908c03e",
      measurementId: "G-FXSCM6QDSQ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // লোকাল স্টোরেজ থেকে ডাটা লোড ও রেন্ডার করার ফাংশন
    function renderOrders() {
      const container = document.getElementById('admin-orders');
      let allOrders = JSON.parse(localStorage.getItem('my_orders')) || [];

      if (allOrders.length === 0) {
        container.innerHTML = "<p>No orders placed yet.</p>";
        return;
      }

      let tableHTML = `<table><tr><th>Order ID</th><th>Date</th><th>Items</th><th>Total</th><th>Status</th></tr>`;
      allOrders.forEach((order, index) => {
        let itemsText = order.items.map(i => `${i.name} (${i.quantity})`).join(', ');
        tableHTML += `
          <tr>
            <td>${order.orderId}</td>
            <td>${order.date}</td>
            <td>${itemsText}</td>
            <td>৳ ${order.total}</td>
            <td>
              <select onchange="window.updateStatus(${index}, this.value)">
                <option value="Pending" ${order.status === 'Pending' ? 'selected' : ''}>Pending</option>
                <option value="Processing" ${order.status === 'Processing' ? 'selected' : ''}>Processing</option>
                <option value="Delivered" ${order.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
              </select>
            </td>
          </tr>
        `;
      });
      tableHTML += `</table>`;
      container.innerHTML = tableHTML;
    }

    // গ্লোবাল ফাংশন হিসেবে ডিক্লেয়ার করা
    window.updateStatus = function (index, newStatus) {
      let allOrders = JSON.parse(localStorage.getItem('my_orders')) || [];
      allOrders[index].status = newStatus;
      localStorage.setItem('my_orders', JSON.stringify(allOrders));
      alert("Order status updated to: " + newStatus);
    };

    document.addEventListener("DOMContentLoaded", renderOrders);
  </script>
</body>

</html>
