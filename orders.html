<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="icon" type="image/jpeg" href="images/img/logo/logo.jpeg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - SKYSION</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .orders-container {
      padding: 150px 6% 80px 6%;
      max-width: 900px;
      margin: 0 auto;
    }

    .orders-container h2 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .order-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 25px;
      margin-bottom: 20px;
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 15px;
      margin-bottom: 15px;
    }

    .status-badge {
      background: #ffa502;
      color: #000;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .order-item-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
    }

    .order-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px dashed rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

<body>

  <header class="navbar">
    <div class="logo"><a href="index.html"><img src="images/img/logo/logo.jpeg" alt="SKYSION LOGO" id="nav-logo"></a>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">HOME</a></li>
        <li><a href="shop.html">SHOP</a></li>
        <li><a href="wishlist.html">WISHLIST</a></li>
        <li><a href="account.html">ACCOUNT</a></li>
      </ul>
    </nav>
    <div class="nav-icons"><a href="cart.html">CART (<span id="cart-count">0</span>)</a></div>
  </header>

  <main class="orders-container">
    <h2>My Orders</h2>
    <div id="my-orders-list">Loading orders...</div>
  </main>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCdQ9XMtzELlWmtVvCt86dmkl8Oo4wyBFA",
      authDomain: "skysion.firebaseapp.com",
      projectId: "skysion",
      storageBucket: "skysion.firebasestorage.app",
      messagingSenderId: "984734912155",
      appId: "1:984734912155:web:246eb7168f775fb908c03e",
      measurementId: "G-FXSCM6QDSQ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Google Script থেকে ডাটা লোড করার লজিক
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwNnaYNC-Nl-R1jfb_VZUpXfnOqZ4zFetryclJG_vc0zHarou8ofRzjd0VU7F1cUiVu/exec';
    const ordersListContainer = document.getElementById('my-orders-list');

    async function loadOrders() {
      try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        ordersListContainer.innerHTML = "";

        data.slice(1).reverse().forEach((row) => {
          const order = {
            orderId: row[0],
            date: row[1],
            totalPrice: row[5],
            paymentMethod: row[6],
            items: row[9],
            status: row[10] || 'Pending'
          };

          ordersListContainer.innerHTML += `
            <div class="order-card">
              <div class="order-header">
                <div>
                  <strong style="color: #fff;">Order ID: ${order.orderId}</strong>
                  <p style="font-size: 12px; color: rgba(255,255,255,0.4); margin: 5px 0 0 0;">Date: ${order.date}</p>
                </div>
                <div><span class="status-badge">${order.status}</span></div>
              </div>
              <div class="order-item-row"><span>Items: ${order.items}</span></div>
              <div class="order-total-row">
                <span>Method: ${order.paymentMethod}</span>
                <span style="color: #d12e43; font-size: 16px;">Total: ৳ ${order.totalPrice}</span>
              </div>
            </div>
          `;
        });
      } catch (error) {
        ordersListContainer.innerHTML = "<p>Error loading orders. Please check your connection.</p>";
      }
    }

    document.addEventListener("DOMContentLoaded", loadOrders);
  </script>

  <script src="js/product.js"></script>
  <script src="js/cart.js"></script>
</body>

</html>
