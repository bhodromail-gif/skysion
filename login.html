<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SKYSION</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 100px 6%;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .login-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 400;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 14px;
      transition: 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #d12e43;
      background: rgba(255, 255, 255, 0.08);
    }

    .login-card p {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 20px;
    }

    .login-card a {
      color: #fff;
      text-decoration: none;
      border-bottom: 1px solid #d12e43;
      padding-bottom: 2px;
    }
  </style>
</head>

<body>

  <header class="navbar">
    <div class="logo">
      <a href="index.html">
        <!-- একদম সঠিক পাথটি নিচে দেওয়া হলো -->
        <img src="images/img/logo/logo.jpeg" alt="SKYSION LOGO" id="nav-logo">
      </a>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">HOME</a></li>
        <li><a href="shop.html">SHOP</a></li>
        <li><a href="wishlist.html">WISHLIST</a></li>
        <li><a href="account.html">ACCOUNT</a></li>
      </ul>
    </nav>
    <div class="nav-icons">
      <a href="cart.html">CART (<span id="cart-count">0</span>)</a>
    </div>
  </header>

  <div class="glow-bg" style="width: 450px; height: 450px; background: #58111a; top: 25%; left: 35%;"></div>

  <main class="login-container">
    <div class="login-card">
      <h2>Maison Login</h2>
      <form id="login-form">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" required placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" required placeholder="Enter your password">
        </div>
        <button type="submit" class="btn-premium" style="width: 100%; margin-top: 10px;">SIGN IN</button>
      </form>
      <p>Don't have an account? <a href="signup.html">Create one</a></p>
    </div>
  </main>
  <script>
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();

      const emailInput = e.target.querySelector('input[type="email"]').value;
      const passwordInput = e.target.querySelector('input[type="password"]').value;

      // মেমোরি থেকে সেভ করা ইউজার খুঁজে বের করা
      const savedUser = JSON.parse(localStorage.getItem('skysion_user'));

      if (savedUser && savedUser.email === emailInput && savedUser.password === passwordInput) {
        // লগইন স্টেট ট্রু (True) করে দেওয়া
        localStorage.setItem('isLoggedIn', 'true');
        alert('Welcome back, ' + savedUser.name + '!');
        window.location.href = 'account.html'; // এবার সরাসরি ড্যাশবোর্ডে যাবে!
      } else {
        alert('Invalid Email or Password! Please signup first.');
      }
    });

    // কেউ যদি অলরেডি লগইন থাকা অবস্থায় ভুল করে লগইন পেজে আসে, তাকে ড্যাশবোর্ডে পাঠিয়ে দেবে
    if (localStorage.getItem('isLoggedIn') === 'true') {
      window.location.href = 'account.html';
    }
  </script>

  <script src="js/app.js"></script>
</body>

</html>
