<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="icon" type="image/jpeg" href="images/img/logo/logo.jpeg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - SKYSION</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .checkout-container {
      padding: 150px 6% 80px 6%;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 50px;
    }

    @media (max-width: 768px) {
      .checkout-container {
        grid-template-columns: 1fr;
      }
    }

    .checkout-form,
    .order-summary-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 40px;
    }

    .checkout-container h2 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 400;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 15px;
      margin-top: 15px;
    }

    /* ম্যানুয়াল পেমেন্ট বক্স স্টাইল */
    .manual-payment-box {
      background: rgba(209, 46, 67, 0.05);
      border: 1px dashed rgba(209, 46, 67, 0.3);
      padding: 20px;
      margin-top: 15px;
      display: none;
      /* ডিফল্টভাবে হাইড থাকবে */
    }

    .btn-premium {
      background: #d12e43;
      color: #fff;
      border: none;
      padding: 15px;
      font-size: 13px;
      letter-spacing: 2px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-premium:hover {
      background: #b02234;
    }
  </style>
</head>

<body>

  <header class="navbar">
    <div class="logo">
      <a href="index.html">
        <img src="images/img/logo/logo.jpeg" alt="SKYSION LOGO" id="nav-logo">
      </a>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">HOME</a></li>
        <li><a href="shop.html">SHOP</a></li>
        <li><a href="wishlist.html">WISHLIST</a></li>
        <li><a href="account.html">ACCOUNT</a></li>
      </ul>
    </nav>
    <div class="nav-icons">
      <a href="cart.html">CART (<span id="cart-count">0</span>)</a>
    </div>
  </header>

  <main class="checkout-container">
    <div class="checkout-form">
      <h2>Shipping Details</h2>
      <form id="checkout-submit-form">
        <div class="form-row">
          <div class="form-group"><label>First Name</label><input type="text" id="cust-first-name" required></div>
          <div class="form-group"><label>Last Name</label><input type="text" id="cust-last-name" required></div>
        </div>
        <div class="form-group"><label>Phone Number</label><input type="tel" id="cust-phone" required
            placeholder="01XXXXXXXXX"></div>
        <div class="form-group"><label>Full Address</label><textarea id="cust-address" rows="3" required
            placeholder="Address..."></textarea></div>

        <div class="form-group">
          <label>Payment Method</label>
          <select id="payment-method">
            <option value="wallet">Pay via Skysion Wallet (Available)</option>
            <option value="cod">Cash on Delivery (COD)</option>
            <option value="bkash">bKash (Manual)</option>
            <option value="nagad">Nagad (Manual)</option>
          </select>
        </div>

        <!-- 📱 ডাইনামিক বিকাশ/নগদ পেমেন্ট গেটওয়ে ইন্টারফেস -->
        <div id="manual-payment-input-box" class="manual-payment-box">
          <p style="color: #ffa502; font-size: 12px; margin-top: 0; line-height: 1.6;">
            👉 দয়া করে আমাদের <span id="payment-gateway-name"
              style="font-weight:bold; text-transform:uppercase;">bKash</span> পার্সোনাল নাম্বার <strong
              style="color:#fff;">01999242241</strong>-এ টাকা <b>Send Money</b> করুন। তারপর নিচের তথ্যগুলো পূরণ করুন:
          </p>
          <div class="form-group">
            <label>Sender Number</label>
            <input type="text" id="payment-number" placeholder="যে নাম্বার থেকে টাকা পাঠিয়েছেন">
          </div>
          <div class="form-group">
            <label>Transaction ID (TxnID)</label>
            <input type="text" id="trx-id" placeholder="বিকাশ/নগদ এর ট্রানজেকশন আইডি দিন">
          </div>
        </div>

        <button type="submit" class="btn-premium" style="width: 100%; margin-top: 20px;">PLACE ORDER</button>
      </form>
    </div>

    <div class="order-summary-box">
      <h2>Your Order</h2>
      <div id="checkout-summary-items"></div>
      <div class="summary-total">
        <span>Total Amount:</span>
        <span style="color: #d12e43;" id="checkout-total-price">৳ ০</span>
      </div>
      <p style="margin-top:20px; font-size:12px; color:rgba(255,255,255,0.5); text-align:right;">
        Your Wallet: <strong id="wallet-balance" style="color:#fff;">৳ 0</strong>
      </p>
    </div>
  </main>

  <!-- জাভাস্ক্রিপ্ট ফাইলগুলোর সঠিক সিরিয়াল লিংক -->
  <script src="js/product.js"></script>
  <script src="js/cart.js"></script>
  <script type="module" src="js/app.js"></script>

  <!-- গেটওয়ে সিলেক্ট লজিক স্ক্রিপ্ট -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const paymentSelect = document.getElementById('payment-method');
      const manualPayBox = document.getElementById('manual-payment-input-box');
      const gatewayNameSpan = document.getElementById('payment-gateway-name');
      const payNumberInput = document.getElementById('payment-number');
      const trxIdInput = document.getElementById('trx-id');

      paymentSelect.addEventListener('change', (e) => {
        const selectedMethod = e.target.value;
        if (selectedMethod === 'bkash' || selectedMethod === 'nagad') {
          gatewayNameSpan.innerText = selectedMethod;
          manualPayBox.style.display = 'block';
          payNumberInput.setAttribute('required', 'true');
          trxIdInput.setAttribute('required', 'true');
        } else {
          manualPayBox.style.display = 'none';
          payNumberInput.removeAttribute('required');
          trxIdInput.removeAttribute('required');
        }
      });

      // ফর্ম সাবমিট হ্যান্ডলার (যা মডিউল স্ক্রিপ্টের সাথে কানেক্ট হবে)
      const form = document.getElementById('checkout-submit-form');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (typeof window.placeOrder === 'function') {
          window.placeOrder(paymentSelect.value);
        } else {
          alert("Error: Order management system is not loaded yet.");
        }
      });
    });
  </script>
</body>

</html>
