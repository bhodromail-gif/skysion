<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - SKYSION</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .checkout-container {
      padding: 150px 6% 80px 6%;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 50px;
    }

    @media (max-width: 768px) {
      .checkout-container {
        grid-template-columns: 1fr;
      }
    }

    .checkout-form,
    .order-summary-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 40px;
    }

    .checkout-container h2 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 400;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 14px;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 15px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <header class="navbar">
    <div class="logo">
      <a href="index.html">
        <img src="images/img/logo/logo.jpeg" alt="SKYSION LOGO" id="nav-logo">
      </a>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">HOME</a></li>
        <li><a href="shop.html">SHOP</a></li>
        <li><a href="wishlist.html">WISHLIST</a></li>
        <li><a href="account.html">ACCOUNT</a></li>
      </ul>
    </nav>
    <div class="nav-icons">
      <a href="cart.html">CART (<span id="cart-count">0</span>)</a>
    </div>
  </header>

  <main class="checkout-container">
    <div class="checkout-form">
      <h2>Shipping Details</h2>
      <form id="checkout-submit-form">
        <div class="form-row">
          <div class="form-group"><label>First Name</label><input type="text" required></div>
          <div class="form-group"><label>Last Name</label><input type="text" required></div>
        </div>
        <div class="form-group"><label>Phone Number</label><input type="tel" required placeholder="01XXXXXXXXX"></div>
        <div class="form-group"><label>Full Address</label><textarea rows="3" required
            placeholder="Address..."></textarea></div>

        <div class="form-group">
          <label>Payment Method</label>
          <select id="payment-method">
            <option value="wallet">Pay via Skysion Wallet (Available)</option>
            <option value="cod">Cash on Delivery (COD)</option>
          </select>
        </div>
        <button type="submit" class="btn-premium" style="width: 100%; margin-top: 20px;">PLACE ORDER</button>
      </form>
    </div>

    <div class="order-summary-box">
      <h2>Your Order</h2>
      <!-- আইডি আমাদের সিস্টেমের সাথে ম্যাচ করে দেওয়া হলো -->
      <div id="checkout-summary-items"></div>
      <div class="summary-total">
        <span>Total Amount:</span>
        <span style="color: #d12e43;" id="checkout-total-price">৳ ০</span>
      </div>
      <p style="margin-top:20px; font-size:12px; color:rgba(255,255,255,0.5); text-align:right;">
        Your Wallet: <strong id="wallet-balance" style="color:#fff;">৳ 0</strong>
      </p>
    </div>
  </main>

  <!-- জাভাস্ক্রিপ্ট ফাইলগুলোর সঠিক সিরিয়াল লিংক -->
  <script src="js/product.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
