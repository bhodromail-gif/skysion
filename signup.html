<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="icon" type="image/jpeg" href="images/img/logo/logo.jpeg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - SKYSION</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .signup-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 120px 6% 80px 6%;
    }

    .signup-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 40px;
      width: 100%;
      max-width: 450px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .signup-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 400;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 14px;
    }

    .form-group input:focus {
      outline: none;
      border-color: #d12e43;
    }

    .signup-card p {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 20px;
    }

    .signup-card a {
      color: #fff;
      text-decoration: none;
      border-bottom: 1px solid #d12e43;
      padding-bottom: 2px;
    }
  </style>
</head>

<body>

  <header class="navbar">
    <div class="logo">
      <a href="index.html">
        <!-- একদম সঠিক পাথটি নিচে দেওয়া হলো -->
        <img src="images/img/logo/logo.jpeg" alt="SKYSION LOGO" id="nav-logo">
      </a>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">HOME</a></li>
        <li><a href="shop.html">SHOP</a></li>
        <li><a href="wishlist.html">WISHLIST</a></li>
        <li><a href="account.html">ACCOUNT</a></li>
      </ul>
    </nav>
    <div class="nav-icons">
      <a href="cart.html">CART (<span id="cart-count">0</span>)</a>
    </div>
  </header>

  <div class="glow-bg" style="width: 500px; height: 500px; background: #58111a; top: 15%; left: 20%;"></div>

  <main class="signup-container">
    <div class="signup-card">
      <h2>Create Account</h2>
      <form id="signup-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" required placeholder="Enter your name">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" required placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" required placeholder="Create a strong password">
        </div>
        <button type="submit" class="btn-premium" style="width: 100%; margin-top: 10px;">REGISTER</button>
      </form>
      <p>Already have an account? <a href="login.html">Sign In</a></p>
    </div>
  </main>

  <script>
    document.getElementById('signup-form').addEventListener('submit', (e) => {
      e.preventDefault();

      // ইনপুট থেকে ডেটা নেওয়া
      const name = e.target.querySelector('input[type="text"]').value;
      const email = e.target.querySelector('input[type="email"]').value;
      const password = e.target.querySelector('input[type="password"]').value;

      // ব্রাউজারের মেমোরিতে ইউজার ডেটা সেভ করা
      const userData = { name: name, email: email, password: password };
      localStorage.setItem('skysion_user', JSON.stringify(userData));

      alert('Registration Successful! Welcome to SKYSION MAISON.');
      window.location.href = 'login.html'; // লগইন পেজে পাঠিয়ে দেওয়া
    });
  </script>
  <script type="module" src="js/app.js"></script>
</body>

</html>
