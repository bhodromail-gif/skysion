<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="icon" type="image/jpeg" href="images/img/logo/logo.jpeg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Wishlist - SKYSION</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .wishlist-container {
      padding: 150px 6% 80px 6%;
      min-height: 80vh;
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      text-align: center;
      margin-bottom: 40px;
    }

    .wishlist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }

    .wishlist-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 20px;
      text-align: center;
      transition: 0.3s;
      position: relative;
    }

    .wishlist-card:hover {
      border-color: rgba(88, 17, 26, 0.5);
    }

    .wishlist-card .img-container {
      height: 250px;
      background: #120507;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .wishlist-card .img-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .wishlist-card h3 {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 1px;
      margin: 15px 0 8px 0;
    }

    .wishlist-card .price {
      color: #d12e43;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 15px;
    }

    .remove-wishlist {
      position: absolute;
      top: 15px;
      right: 15px;
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      font-size: 16px;
      z-index: 10;
    }

    .remove-wishlist:hover {
      color: #d12e43;
    }
  </style>
</head>

<body>

  <header class="navbar">
    <div class="logo"><a href="index.html"><img src="images/img/logo/logo.jpeg" alt="SKYSION LOGO" id="nav-logo"></a>

  <div class="glow-bg" style="width: 400px; height: 400px; background: #58111a; top: 20%; left: -10%;"></div>

  <main class="wishlist-container">
    <h1 class="page-title">Your Wishlist</h1>
    <div class="wishlist-grid" id="wishlist-items-container"></div>
