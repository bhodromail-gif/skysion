<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="icon" type="image/jpeg" href="images/img/logo/logo.jpeg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - SKYSION</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .shop-container {
      padding: 150px 6% 80px 6%;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }

    .product-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 20px;
      text-align: center;
    }

    .product-card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      margin-bottom: 15px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }

    button {
      cursor: pointer;
      padding: 10px;
      border: none;
    }

    .add-to-cart {
      background: #58111a;
      color: white;
    }

    .add-to-wishlist {
      background: transparent;
      border: 1px solid #d12e43;
      color: #d12e43;
    }
  </style>
</head>

<body>

  <header class="navbar">
    <div class="logo"><a href="index.html"><img src="images/img/logo/logo.jpeg" alt="SKYSION LOGO" id="nav-logo"></a>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">HOME</a></li>
        <li><a href="shop.html" class="active">SHOP</a></li>
        <li><a href="wishlist.html">WISHLIST</a></li>
        <li><a href="orders.html">MY ORDERS</a></li>
        <li><a href="account.html">ACCOUNT</a></li>
      </ul>
    </nav>
    <div class="nav-icons"><a href="cart.html">CART (<span id="cart-count">0</span>)</a></div>
  </header>

  <main class="shop-container">
    <h1 style="text-align: center; margin-bottom: 40px;">Our Collection</h1>
    <div class="product-grid" id="product-list">
      <!-- প্রোডাক্টগুলো এখানে লোড হবে -->
    </div>
  </main>

  <footer>
    <p>&copy; 2026 SKYSION MAISON. ALL RIGHTS RESERVED.</p>
  </footer>

  <!-- Firebase Initialization -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCdQ9XMtzELlWmtVvCt86dmkl8Oo4wyBFA",
      authDomain: "skysion.firebaseapp.com",
      projectId: "skysion",
      storageBucket: "skysion.firebasestorage.app",
      messagingSenderId: "984734912155",
      appId: "1:984734912155:web:246eb7168f775fb908c03e",
      measurementId: "G-FXSCM6QDSQ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    console.log("Firebase Connected in Shop Page");

  <!-- স্ক্রিপ্ট ফাইল -->
  <script src="js/product.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/wishlist.js"></script>
  <script type="module" src="js/app.js"></script>

  <script>
    const productList = document.getElementById('product-list');

    function loadProducts() {
      if (typeof products === 'undefined') {
        productList.innerHTML = "<p>Loading products...</p>";
        return;
      }
      productList.innerHTML = "";
      products.forEach(product => {
        productList.innerHTML += `
            <div class="product-card">
                <img src="${product.image}" alt="${product.name}">
                <h3>${product.name}</h3>
                <p>৳ ${product.price}</p>
                <div class="btn-group">
                    <button class="add-to-cart" onclick="window.addToCart(${product.id})">Add to Cart</button>
                    <button class="add-to-wishlist" onclick="window.addToWishlist(${product.id})">Add to Wishlist</button>
                </div>
            </div>
        `;
      });
    }

    document.addEventListener("DOMContentLoaded", loadProducts);
  </script>
</body>

</html>
