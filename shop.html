<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="icon" type="image/jpeg" href="images/img/logo/logo.jpeg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - SKYSION</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .shop-container {
      padding: 150px 6% 80px 6%;
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 400;
      letter-spacing: 2px;
      margin-bottom: 40px;
      text-align: center;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 40px 25px;
    }

    .product-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: 0.4s ease;
    }

    .product-card:hover {
      border-color: rgba(88, 17, 26, 0.5);
      transform: translateY(-5px);
    }

    .img-container {
      height: 400px;
      background: #120507;
      position: relative;
      overflow: hidden;
    }

    .img-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-details {
      padding: 20px;
      text-align: center;
    }

    .product-details h3 {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .product-details .price {
      color: #d12e43;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

  <header class="navbar">
    <div class="logo">
      <a href="index.html">
        <img src="images/img/logo/logo.jpeg" alt="SKYSION LOGO" id="nav-logo">
      </a>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">HOME</a></li>
        <li><a href="shop.html" class="active">SHOP</a></li>
        <li><a href="wishlist.html">WISHLIST</a></li>
        <li><a href="account.html">ACCOUNT</a></li>
        <!-- ➕ নতুন সাপোর্ট পেজের লিংক এখানে যোগ করা হলো -->
        <li><a href="support.html">SUPPORT</a></li>
      </ul>
    </nav>
    <div class="nav-icons">
      <a href="cart.html">CART (<span id="cart-count">0</span>)</a>
    </div>
  </header>

  <div class="glow-bg" style="width: 400px; height: 400px; background: #58111a; bottom: 10%; right: -5%;"></div>

  <main class="shop-container">
    <h1 class="page-title">Maison Collection</h1>

    <!-- আইডি যোগ করা হলো; এর ভেতর জাভাস্ক্রিপ্ট অটোমেটিক প্রোডাক্টগুলো বসিয়ে দেবে -->
    <div class="product-grid" id="product-container">
      <!-- আগে যেখানে ম্যানুয়াল প্রোডাক্ট ছিল, সেগুলো সব মুছে দেওয়া হয়েছে -->
    </div>
  </main>

  <footer>
    <p>&copy; 2026 SKYSION MAISON. ALL RIGHTS RESERVED.</p>
  </footer>

  <!-- জাভাস্ক্রিপ্ট ফাইলগুলোর সঠিক সিরিয়াল লিংক -->
  <script src="js/product.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>

</body>

</html>
